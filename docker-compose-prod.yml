services:
  backend:
    container_name: backend_container
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    env_file:
      - .env.production

  frontend-react:
    container_name: frontend_container
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend/src:/usr/src/app/src
    ports:
      - "8005:80"
    command: ["sh", "-c", "envsubst '$$CURRENT_PROFILE' < /etc/nginx/nginx.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"]

  redis:
    container_name: redis_container
    restart: unless-stopped
    image: redis:8
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

  mongodb:
    container_name: mongodb_container
    restart: unless-stopped
    image: mongo:8
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: llm-code
    volumes:
      - mongodb-data:/data/db

volumes:
  mongodb-data:
  redis-data:
