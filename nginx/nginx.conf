worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    upstream platform_backend {
        server backend:7000;
    }

    upstream platform_frontend {
        server frontend:5173;
    }

    server {
        listen 80;
        server_name _;

        # Session preview containers
        # Per-session configs are written to /etc/nginx/sessions/*.conf
        # by the backend docker_orchestrator service
        include /etc/nginx/sessions/*.conf;

        # Platform backend API (non-session routes)
        location /ws/ {
            proxy_pass http://platform_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        location /api/ {
            proxy_pass http://platform_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /session/ {
            proxy_pass http://platform_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /admin/ {
            proxy_pass http://platform_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://platform_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}